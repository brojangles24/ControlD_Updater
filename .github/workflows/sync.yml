name: Control D Sync

on:
  schedule:
    # OFFSET CRON: Runs every day at 05:17 UTC to avoid GitHub's top-of-the-hour queue delays.
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # Optional but recommended: Prevent overlapping runs if a previous sync hung
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up future runs by caching dependencies

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Run Sync Script
        env:
          # Your script looks for 'TOKEN', ensure this matches your GitHub Secret name exactly
          TOKEN: ${{ secrets.CONTROLD_TOKEN }} 
        run: python main.py

      - name: Commit and Push State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          
          # Only commit if git status shows modifications
          if ! git diff --staged --quiet; then
            git commit -m "chore: Update sync state [skip ci]"
            git push
          else
            echo "No changes to state.json to commit."
          fi
